swagger: "2.0"
info:
  title: Jugaad API Gateway
  version: "3.0"
schemes:
  - https
produces:
  - application/json

paths:
  # ---- PUBLIC ENDPOINTS (Flutter app) ----
  /v1/jobs:
    post:
      operationId: createJob
      x-google-backend:
        address: https://jugaad-request-service-745766971944.asia-south1.run.app
        path_translation: CONSTANT_ADDRESS
      responses: { "200": { description: OK } }
      parameters:
        - { in: body, name: body, schema: { type: object } }

  /v1/jobs/{job_id}:
    get:
      operationId: getJob
      x-google-backend:
        address: https://jugaad-request-service-745766971944.asia-south1.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      parameters:
        - { in: path, name: job_id, type: string, required: true }
      responses: { "200": { description: OK } }
    delete:
      operationId: cancelJob
      x-google-backend:
        address: https://jugaad-request-service-745766971944.asia-south1.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      parameters:
        - { in: path, name: job_id, type: string, required: true }
      responses: { "200": { description: OK } }

  /v1/jobs/{job_id}/accept:
    post:
      operationId: acceptJob
      x-google-backend:
        address: https://jugaad-job-service-745766971944.asia-south1.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      parameters:
        - { in: path, name: job_id, type: string, required: true }
      responses: { "200": { description: OK } }

  /v1/jobs/{job_id}/ack:
    post:
      operationId: ackJob
      x-google-backend:
        address: https://jugaad-job-service-745766971944.asia-south1.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      parameters:
        - { in: path, name: job_id, type: string, required: true }
      responses: { "200": { description: OK } }

  /v1/jobs/{job_id}/complete:
    post:
      operationId: completeJob
      x-google-backend:
        address: https://jugaad-job-service-745766971944.asia-south1.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      parameters:
        - { in: path, name: job_id, type: string, required: true }
      responses: { "200": { description: OK } }

  /v1/jobs/{job_id}/pass:
    post:
      operationId: passJob
      x-google-backend:
        address: https://jugaad-job-service-745766971944.asia-south1.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      parameters:
        - { in: path, name: job_id, type: string, required: true }
      responses: { "200": { description: OK } }

  /v1/jobs/{job_id}/review:
    post:
      operationId: reviewJob
      x-google-backend:
        address: https://jugaad-job-service-745766971944.asia-south1.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      parameters:
        - { in: path, name: job_id, type: string, required: true }
      responses: { "200": { description: OK } }

  /v1/workers/register:
    post:
      operationId: registerWorker
      x-google-backend:
        address: https://jugaad-worker-service-745766971944.asia-south1.run.app
        path_translation: CONSTANT_ADDRESS
      responses: { "200": { description: OK } }

  /v1/workers/{worker_id}/heartbeat:
    post:
      operationId: workerHeartbeat
      x-google-backend:
        address: https://jugaad-worker-service-745766971944.asia-south1.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      parameters:
        - { in: path, name: worker_id, type: string, required: true }
      responses: { "200": { description: OK } }

  /v1/workers/{worker_id}/fcm-token:
    post:
      operationId: workerFcmToken
      x-google-backend:
        address: https://jugaad-worker-service-745766971944.asia-south1.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      parameters:
        - { in: path, name: worker_id, type: string, required: true }
      responses: { "200": { description: OK } }

  /v1/users/{user_id}/fcm-token:
    post:
      operationId: userFcmToken
      x-google-backend:
        address: https://jugaad-user-service-745766971944.asia-south1.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      parameters:
        - { in: path, name: user_id, type: string, required: true }
      responses: { "200": { description: OK } }

  /v1/jobs/{job_id}/create-order:
    post:
      operationId: createOrder
      x-google-backend:
        address: https://jugaad-payment-service-745766971944.asia-south1.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      parameters:
        - { in: path, name: job_id, type: string, required: true }
      responses: { "200": { description: OK } }

  /v1/webhooks/razorpay:
    post:
      operationId: razorpayWebhook
      x-google-backend:
        address: https://jugaad-payment-service-745766971944.asia-south1.run.app
        path_translation: CONSTANT_ADDRESS
      responses: { "200": { description: OK } }

  /v1/admin/{path}:
    post:
      operationId: adminPost
      x-google-backend:
        address: https://jugaad-admin-service-745766971944.asia-south1.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      parameters:
        - { in: path, name: path, type: string, required: true }
      responses: { "200": { description: OK } }
    get:
      operationId: adminGet
      x-google-backend:
        address: https://jugaad-admin-service-745766971944.asia-south1.run.app
        path_translation: APPEND_PATH_TO_ADDRESS
      parameters:
        - { in: path, name: path, type: string, required: true }
      responses: { "200": { description: OK } }

  # ---- INTERNAL ENDPOINTS — QStash callbacks route through here (FIX A) ----
  # QStash calls these public gateway paths. Gateway forwards to internal Cloud Run.
  # The Upstash-Signature header is passed through for backend HMAC validation.

  /internal/job/timeout:
    post:
      operationId: jobTimeout
      x-google-backend:
        address: https://jugaad-job-service-745766971944.asia-south1.run.app/timeout
        path_translation: CONSTANT_ADDRESS
      responses: { "200": { description: OK } }

  /internal/scheduler/activate-scheduled:
    post:
      operationId: activateScheduled
      x-google-backend:
        address: https://jugaad-scheduler-service-745766971944.asia-south1.run.app/activate-scheduled
        path_translation: CONSTANT_ADDRESS
      responses: { "200": { description: OK } }

  /internal/scheduler/timeout:
    post:
      operationId: schedulerTimeout
      x-google-backend:
        address: https://jugaad-scheduler-service-745766971944.asia-south1.run.app/timeout
        path_translation: CONSTANT_ADDRESS
      responses: { "200": { description: OK } }
