name: 🚀 Jugaad CI/CD Pipeline

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  GCP_REGION: ${{ secrets.GCP_REGION }}
  GAR_HOSTNAME: ${{ secrets.GCP_REGION }}-docker.pkg.dev
  GAR_REPO: jugaad
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # fixes Node.js deprecation warnings

permissions:
  contents: read
  id-token: write

jobs:
  # ============================================================================
  # STAGE 1: Parallel Build and Push to Google Artifact Registry
  # ============================================================================
  build-and-push:
    name: Build & Push (${{ matrix.service_name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # let all services attempt build
      matrix:
        include:
          - service_name: user-service
            folder: user_service
          - service_name: auth-service
            folder: auth_service
          - service_name: booking-service
            folder: booking_service
          - service_name: worker-service
            folder: worker_service
          - service_name: payment-service
            folder: payment_service
          - service_name: notification-service
            folder: notification_service
          - service_name: review-service
            folder: review_service
          - service_name: matching-service
            folder: matching_service
          - service_name: admin-service
            folder: admin_service

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: ☁️ Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: 🐳 Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GAR_HOSTNAME }} --quiet

      - name: 🔨 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          # Context is jugaad_backend root to ensure COPY shared/ works perfectly
          context: Jugaad app/Jugaad app/jugaad_backend
          file: Jugaad app/Jugaad app/jugaad_backend/services/${{ matrix.folder }}/Dockerfile
          push: true
          tags: |
            ${{ env.GAR_HOSTNAME }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ matrix.service_name }}:latest
            ${{ env.GAR_HOSTNAME }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ matrix.service_name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service_name }}

  # ============================================================================
  # STAGE 2: Parallel Deploy to Google Cloud Run (Requires ALL builds to succeed)
  # ============================================================================
  deploy:
    name: 🚀 Deploy (${{ matrix.service_name }})
    runs-on: ubuntu-latest
    needs: build-and-push   # only runs if ALL 9 builds succeed
    strategy:
      fail-fast: true       # Fail-fast: abort remaining deployments if any fails
      matrix:
        include:
          - service_name: user-service
            folder: user_service
            port: 8001
          - service_name: auth-service
            folder: auth_service
            port: 8002
          - service_name: booking-service
            folder: booking_service
            port: 8003
          - service_name: worker-service
            folder: worker_service
            port: 8004
          - service_name: payment-service
            folder: payment_service
            port: 8005
          - service_name: notification-service
            folder: notification_service
            port: 8006
          - service_name: review-service
            folder: review_service
            port: 8007
          - service_name: matching-service
            folder: matching_service
            port: 8008
          - service_name: admin-service
            folder: admin_service
            port: 8009

    steps:
      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 🚀 Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: jugaad-${{ matrix.service_name }}
          image: ${{ env.GAR_HOSTNAME }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ matrix.service_name }}:${{ github.sha }}
          region: ${{ env.GCP_REGION }}
          flags: |
            --port=${{ matrix.port }}
            --allow-unauthenticated
            --min-instances=1
            --max-instances=10
            --memory=512Mi
            --cpu=1
            --timeout=300s
            --liveness-probe-path=/health
            --liveness-probe-failure-threshold=3

  # ============================================================================
  # STAGE 3: Run Summary and Diagnostics
  # ============================================================================
  summary:
    name: 📊 Deployment Summary
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: ✅ Post Summary
        run: |
          echo "## 🚀 Jugaad Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "### ✅ All 9 microservices deployed successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Deployment failed. Check logs above." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> [!CAUTION]" >> $GITHUB_STEP_SUMMARY
            echo "> **Failure Alert**: Some services failed to deploy. Due to \`fail-fast: true\`, all pending deployments were cancelled to keep your system consistent." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
