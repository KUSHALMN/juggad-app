name: Jugaad CI/CD Pipeline (GAR & Cloud Run)

on:
  push:
    branches:
      - main

# Configure environment variables for easy adjustments
env:
  GAR_REPO_NAME: jugaad-repo # Name of your Google Artifact Registry repository

permissions:
  contents: read
  id-token: write

jobs:
  # ============================================================================
  # STAGE 1: Parallel Build and Push to Google Artifact Registry
  # ============================================================================
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service:
          - { folder: "auth_service", name: "auth-service" }
          - { folder: "worker_service", name: "worker-service" }
          - { folder: "user_service", name: "user-service" }
          - { folder: "admin_service", name: "admin-service" }
          - { folder: "booking_service", name: "booking-service" }
          - { folder: "payment_service", name: "payment-service" }
          - { folder: "review_service", name: "review-service" }
          - { folder: "matching_service", name: "matching-service" }
          - { folder: "notification_service", name: "notification-service" }
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.GCP_REGION }}-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: Jugaad app/Jugaad app/jugaad_backend
          file: Jugaad app/Jugaad app/jugaad_backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO_NAME }}/jugaad-${{ matrix.service.name }}:${{ github.sha }}
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO_NAME }}/jugaad-${{ matrix.service.name }}:latest

  # ============================================================================
  # STAGE 2: Parallel Deploy to Google Cloud Run (Requires successful builds)
  # ============================================================================
  deploy:
    name: Deploy
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true # Instantly abort remaining active jobs in matrix if one fails
      matrix:
        service:
          - { folder: "auth_service", name: "auth-service" }
          - { folder: "worker_service", name: "worker-service" }
          - { folder: "user_service", name: "user-service" }
          - { folder: "admin_service", name: "admin-service" }
          - { folder: "booking_service", name: "booking-service" }
          - { folder: "payment_service", name: "payment-service" }
          - { folder: "review_service", name: "review-service" }
          - { folder: "matching_service", name: "matching-service" }
          - { folder: "notification_service", name: "notification-service" }
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Google Cloud Run
        run: |
          IMAGE_TAG="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO_NAME }}/jugaad-${{ matrix.service.name }}:${{ github.sha }}"
          
          echo "🚀 Deploying jugaad-${{ matrix.service.name }} using image ${IMAGE_TAG}..."
          
          gcloud run deploy "jugaad-${{ matrix.service.name }}" \
            --image "${IMAGE_TAG}" \
            --region "${{ secrets.GCP_REGION }}" \
            --platform managed \
            --ingress internal-and-cloud-load-balancing \
            --no-allow-unauthenticated \
            --set-env-vars "SERVICE_NAME=${{ matrix.service.folder }}" \
            --min-instances 1 \
            --max-instances 10 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 300s \
            --liveness-probe-path "/health" \
            --liveness-probe-failure-threshold 3 \
            --quiet
            
          echo "✅ Successfully deployed jugaad-${{ matrix.service.name }}!"

  # ============================================================================
  # STAGE 3: Failure Notification & Summary (Runs only on pipeline failures)
  # ============================================================================
  notify-failure:
    name: Pipeline Failure Summary
    needs: [build-and-push, deploy]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Post Failure Notification to Job Summary
        run: |
          echo "## ❌ Jugaad CI/CD Pipeline Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> [!CAUTION]" >> $GITHUB_STEP_SUMMARY
          echo "> ### ⚠️ Deployment Run Failure Alert" >> $GITHUB_STEP_SUMMARY
          echo "> One or more microservices encountered an error during building, pushing, or deploying." >> $GITHUB_STEP_SUMMARY
          echo "> Due to the \`fail-fast: true\` configuration, all remaining and pending deployments were aborted to prevent a partial, inconsistent release state." >> $GITHUB_STEP_SUMMARY
          echo "> Please inspect the failed step logs above to debug." >> $GITHUB_STEP_SUMMARY
